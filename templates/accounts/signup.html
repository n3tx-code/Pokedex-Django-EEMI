{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Pokedex EEMI</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .navbar-custom {
            background-color: #2f6fed;
        }

        .login-card {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            background-color: #2e7d1a;
            color: white;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .btn-primary {
            background-color: #2f6fed;
            border: none;
        }

        .btn-primary:hover {
            background-color: #255bcc;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Pokedex</a>
        <div class="ms-auto">
            <a class="nav-link d-inline text-white" href="{% url 'homepage' %}">Home</a>
            <a class="nav-link d-inline text-light" href="{% url 'pokemon_list' %}">Pokemon List</a>
        </div>
    </div>
</nav>

<!-- Container -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card login-card p-4 col-md-5">

        <!-- Title -->
        <div class="login-header text-center mb-3">
            Inscription Pokedex EEMI
        </div>
        <form action="{% url 'signup' %}" method="POST">
            {% csrf_token %}
            {{ form.as_div }}
            <button type="submit" class="btn btn-primary">Envoyer</button>
        </form>

        <!-- Extra -->
        <div class="text-center mt-3">
            <small class="text-muted">
                © 2024 Pokedex EEMI
            </small>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
