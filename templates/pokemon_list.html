{% extends "base.html" %}
{% block content %}
    <div class="container mt-5">
        <h1>Liste des pokémons</h1>
        <ul>
            {% for pokemon in pokemon_list %}
                <a href="{% url 'pokemon_detail' pokemon.pk %}">
                    <li>
                        {{ pokemon.name }}
                    </li>
                </a>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
