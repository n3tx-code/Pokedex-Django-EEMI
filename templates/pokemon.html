{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex EEMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="container mt-5">
    <h1>{{ pokemon.name }}</h1>
    <p>
        Ceci est la page de description d'un pokémon.
    </p>
    <ul>
        {% for pokemon_type in pokemon.types.all %}
            <a href="{% url 'type_detail' pk=pokemon_type.pk %}">
                <li>{{ pokemon_type.name }}</li>
            </a>
        {% empty %}
            <p>Ce pokémon n'a pas de type</p>
        {% endfor %}
    </ul>
    <footer class=" pt-3 mt-4 text-muted border-top">
        &copy; 2024 Pokedex EEMI
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
