{% extends "base.html" %}
{% block content %}
    <div class="container mt-5">
        <h1>{{ pokemon.name }}</h1>
        <p>
            Ceci est la page de description d'un pokémon.
        </p>
        <ul>
            {% for pokemon_type in pokemon.types.all %}
                <a href="{% url 'type_detail' pk=pokemon_type.pk %}">
                    <li>{{ pokemon_type.name }}</li>
                </a>
            {% empty %}
                <p>Ce pokémon n'a pas de type</p>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
